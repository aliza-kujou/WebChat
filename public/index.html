<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kazuma Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon-blue: #3b82f6; 
            --dark-bg: #0d0e12; 
            --card-bg: #16171f; 
            --text-main: #f3f4f6; 
            --text-muted: #9ca3af; 
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        body, html {
            background-color: var(--dark-bg);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
        }
        #app-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 24px;
            padding: 35px 25px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            text-align: center;
        }
        .brand { font-weight: 800; font-size: 1.6rem; letter-spacing: -0.5px; margin-bottom: 5px; }
        .brand span { color: var(--neon-blue); }
        .subtitle { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 25px; }
        .form-group { text-align: left; margin-bottom: 18px; }
        .form-group label { display: block; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; margin-bottom: 6px; color: var(--text-muted); letter-spacing: 0.5px; }
        .form-control {
            width: 100%; box-sizing: border-box;
            background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 12px 14px; border-radius: 12px;
            color: var(--text-main); font-family: inherit; font-size: 0.9rem;
            transition: var(--transition);
        }
        .form-control:focus { outline: none; border-color: var(--neon-blue); background: rgba(0, 0, 0, 0.3); }
        .btn-submit {
            width: 100%; background: var(--neon-blue); color: #ffffff;
            border: none; padding: 14px; border-radius: 12px;
            font-weight: 700; font-size: 0.95rem; cursor: pointer;
            transition: var(--transition); margin-top: 10px;
        }
        .btn-submit:hover { opacity: 0.9; transform: translateY(-1px); }
        .pairing-container {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background: rgba(59, 130, 246, 0.1);
            border: 1px dashed var(--neon-blue);
            border-radius: 12px;
        }
        .pairing-code {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 4px;
            color: var(--neon-blue);
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="app-container">
        <div class="auth-card" id="login-view">
            <div class="brand">KAZUMA <span>CHAT</span></div>
            <div class="subtitle">Vincula tu WhatsApp mediante codigo de digitos</div>
            <form id="loginForm">
                <div class="form-group">
                    <label>Numero de Telefono (con codigo de pais)</label>
                    <input type="text" id="phone" class="form-control" placeholder="549XXXXXXXX" required>
                </div>
                <button type="submit" class="btn-submit">Generar Codigo</button>
            </form>
            <div class="pairing-container" id="pairing-box">
                <div style="font-size: 0.85rem; color: var(--text-muted);">Introduce este codigo en tu telefono:</div>
                <div class="pairing-code" id="code-display">---- ----</div>
            </div>
        </div>
    </div>

    <script>
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const ws = new WebSocket(`${protocol}//${window.location.host}`);
        
        ws.onmessage = async (event) => {
            const msg = JSON.parse(event.data);
            
            if (msg.event === 'pairing_code') {
                document.getElementById('pairing-box').style.display = 'block';
                document.getElementById('code-display').innerText = msg.code;
            }
            
            if (msg.event === 'status' && msg.state === 'connected') {
                localStorage.setItem('kazuma_user', JSON.stringify(msg.user));
                loadHomeView();
            }
            
            if (msg.event === 'new_message' && window.appendMessageToUI) {
                window.appendMessageToUI(msg.data);
            }
        };

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const phone = document.getElementById('phone').value.trim();
            ws.send(JSON.stringify({ action: 'start_pairing', phone }));
        });

        async function loadHomeView() {
            try {
                const response = await fetch('home.html');
                const html = await response.text();
                document.getElementById('app-container').innerHTML = html;
                if (window.initHomeApp) window.initHomeApp(ws);
            } catch (e) {}
        }

        ws.onopen = () => {
            ws.send(JSON.stringify({ action: 'get_chats' }));
        };
    </script>
</body>
</html>
