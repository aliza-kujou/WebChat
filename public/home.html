<style>
    .home-layout {
        display: flex;
        width: 100%;
        height: 100%;
        background: var(--dark-bg);
    }
    .sidebar {
        width: 350px;
        height: 100%;
        background: var(--card-bg);
        border-right: 1px solid rgba(255, 255, 255, 0.05);
        display: flex;
        flex-direction: column;
    }
    .main-chat {
        flex: 1;
        height: 100%;
        display: flex;
        flex-direction: column;
        background: rgba(0, 0, 0, 0.2);
    }
    .sidebar-header {
        padding: 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    .user-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        border: 2px solid var(--neon-blue);
        object-fit: cover;
    }
    .chats-stream {
        flex: 1;
        overflow-y: auto;
        padding: 10px;
    }
    .chat-card {
        display: flex;
        align-items: center;
        padding: 12px;
        border-radius: 14px;
        margin-bottom: 8px;
        cursor: pointer;
        transition: var(--transition);
    }
    .chat-card:hover {
        background: rgba(255, 255, 255, 0.03);
    }
    .chat-info {
        margin-left: 12px;
        flex: 1;
    }
    .chat-name {
        font-weight: 600;
        font-size: 0.95rem;
    }
    .chat-lastmsg {
        font-size: 0.8rem;
        color: var(--text-muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-top: 2px;
    }
    .chat-header {
        padding: 20px;
        background: var(--card-bg);
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        display: flex;
        align-items: center;
    }
    .messages-box {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }
    .msg-bubble {
        max-width: 65%;
        padding: 12px 16px;
        border-radius: 16px;
        font-size: 0.9rem;
        line-height: 1.4;
    }
    .msg-in {
        background: var(--card-bg);
        align-self: flex-start;
        border-bottom-left-radius: 4px;
    }
    .msg-out {
        background: var(--neon-blue);
        color: white;
        align-self: flex-end;
        border-bottom-right-radius: 4px;
    }
    .input-area {
        padding: 20px;
        background: var(--card-bg);
        display: flex;
        gap: 12px;
    }
    .input-box {
        flex: 1;
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.05);
        padding: 14px;
        border-radius: 12px;
        color: var(--text-main);
        font-family: inherit;
    }
    .input-box:focus {
        outline: none;
        border-color: var(--neon-blue);
    }
    .btn-send {
        background: var(--neon-blue);
        color: white;
        border: none;
        padding: 0 20px;
        border-radius: 12px;
        cursor: pointer;
        font-weight: 600;
    }
</style>

<div class="home-layout">
    <div class="sidebar">
        <div class="sidebar-header">
            <div style="display: flex; align-items: center; gap: 10px;">
                <img id="my-avatar" src="https://via.placeholder.com/150" class="user-avatar">
                <div style="font-weight: 700; font-size: 1.1rem;" id="my-name">Kazuma User</div>
            </div>
            <i class="fa-solid fa-ellipsis-vertical" style="color: var(--text-muted); cursor: pointer;"></i>
        </div>
        <div class="chats-stream" id="chats-list"></div>
    </div>
    <div class="main-chat">
        <div class="chat-header">
            <div style="font-weight: 700;" id="active-chat-title">Selecciona un chat para empezar</div>
        </div>
        <div class="messages-box" id="messages-container"></div>
        <div class="input-area">
            <input type="text" id="message-input" class="input-box" placeholder="Escribe un mensaje...">
            <button id="send-btn" class="btn-send"><i class="fa-solid fa-paper-plane"></i></button>
        </div>
    </div>
</div>

<script>
    window.initHomeApp = function(socket) {
        let currentActiveJid = null;
        const user = JSON.parse(localStorage.getItem('kazuma_user') || '{}');
        
        if (user.ppUrl) document.getElementById('my-avatar').src = user.ppUrl;
        if (user.name) document.getElementById('my-name').innerText = user.name;

        window.appendMessageToUI = function(msg) {
            const container = document.getElementById('messages-container');
            const bubble = document.createElement('div');
            bubble.classList.add('msg-bubble');
            bubble.classList.add(msg.fromMe ? 'msg-out' : 'msg-in');
            bubble.innerText = msg.text;
            
            const chatCard = document.getElementById(`chat-${msg.chat}`);
            if (chatCard) {
                chatCard.querySelector('.chat-lastmsg').innerText = msg.text;
            } else {
                createChatCard({ id: msg.chat, name: msg.sender.split('@')[0], lastMessage: msg.text });
            }

            if (currentActiveJid === msg.chat) {
                container.appendChild(bubble);
                container.scrollTop = container.scrollHeight;
            }
        };

        function createChatCard(chat) {
            const list = document.getElementById('chats-list');
            const card = document.createElement('div');
            card.className = 'chat-card';
            card.id = `chat-${chat.id}`;
            card.innerHTML = `
                <img src="https://via.placeholder.com/150" class="user-avatar" id="avatar-${chat.id}">
                <div class="chat-info">
                    <div class="chat-name">${chat.name || chat.id.split('@')[0]}</div>
                    <div class="chat-lastmsg">${chat.lastMessage || ''}</div>
                </div>
            `;
            
            card.addEventListener('click', () => {
                currentActiveJid = chat.id;
                document.getElementById('active-chat-title').innerText = chat.name || chat.id.split('@')[0];
                document.getElementById('messages-container').innerHTML = '';
            });

            list.appendChild(card);
            socket.send(JSON.stringify({ action: 'get_profile_picture', jid: chat.id }));
        }

        document.getElementById('send-btn').addEventListener('click', () => {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text || !currentActiveJid) return;

            socket.send(JSON.stringify({ action: 'send_message', to: currentActiveJid, text }));
            
            const container = document.getElementById('messages-container');
            const bubble = document.createElement('div');
            bubble.className = 'msg-bubble msg-out';
            bubble.innerText = text;
            container.appendChild(bubble);
            container.scrollTop = container.scrollHeight;
            
            const chatCard = document.getElementById(`chat-${currentActiveJid}`);
            if (chatCard) chatCard.querySelector('.chat-lastmsg').innerText = text;

            input.value = '';
        });
    };
</script>
